<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JogjaGuide — Discover Yogyakarta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ══ HERO PAGE ══════════════════════════════════════════════════════════ -->
  <div class="hero">

    <div class="hero__bg"></div>

    <!-- NAV -->
    <nav class="nav">
      <a class="nav__brand" href="#">JOGJA TRAVELING<span class="nav__dot">◉</span></a>
      <ul class="nav__links">
        <li><a href="#" class="nav__link nav__link--active">Home</a></li>
        <li><a href="#" class="nav__link">Destinasi</a></li>
        <li><a href="#" class="nav__link">Kuliner</a></li>
        <li><a href="#" class="nav__link">Tours</a></li>
      </ul>
      <!-- Chat trigger button (top-right) -->
      <button class="nav__chat-btn" id="chat-toggle" aria-label="Buka AI Guide">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        AI Guide
      </button>
    </nav>

    <!-- HERO HEADLINE -->
    <div class="hero__content">
      <h1 class="hero__title">YOGYAKARTA</h1>
      <div class="hero__cta-row">
        <button class="hero__watch-btn" id="open-chat-hero">
          ASK AI FOR EXPLORE YOGYAKARTA
        </button>
      </div>
    </div>

    <!-- LEARN MORE vertical label -->
    <div class="hero__scroll">
      <span class="hero__scroll-text">JELAJAHI</span>
      <div class="hero__scroll-line"></div>
    </div>

    <!-- Bottom destination strip -->
    <div class="hero__strip">
      <button class="strip__item" data-prompt="Ceritakan tentang Candi Borobudur dan tips berkunjung ke sana">
        <span class="strip__num">01</span>
        <span class="strip__name">Borobudur</span>
        <span class="strip__arrow">↗</span>
      </button>
      <button class="strip__item" data-prompt="Apa yang menarik dari Keraton Yogyakarta dan bagaimana cara berkunjung?">
        <span class="strip__num">02</span>
        <span class="strip__name">Keraton</span>
        <span class="strip__arrow">↗</span>
      </button>
      <button class="strip__item" data-prompt="Ceritakan tentang Candi Prambanan dan waktu terbaik untuk berkunjung">
        <span class="strip__num">03</span>
        <span class="strip__name">Prambanan</span>
        <span class="strip__arrow">↗</span>
      </button>
      <button class="strip__item" data-prompt="Apa saja yang ada di Malioboro? Tips belanja dan kuliner di sana">
        <span class="strip__num">04</span>
        <span class="strip__name">Malioboro</span>
        <span class="strip__arrow">↗</span>
      </button>
      <button class="strip__item" data-prompt="Rekomendasikan pantai-pantai terbaik di Jogja dan sekitarnya">
        <span class="strip__num">05</span>
        <span class="strip__name">Pantai Selatan</span>
        <span class="strip__arrow">↗</span>
      </button>
      <button class="strip__item" data-prompt="Rekomendasikan itinerary 3 hari 2 malam di Jogja yang lengkap">
        <span class="strip__num">06</span>
        <span class="strip__name">Itinerary</span>
        <span class="strip__arrow">↗</span>
      </button>
    </div>

  </div>

  <!-- ══ CHAT POPOVER ════════════════════════════════════════════════════════ -->
  <div class="chat-popover" id="chat-popover" aria-hidden="true">

    <!-- Popover header -->
    <div class="popover__header">
      <div class="popover__avatar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="currentColor"/>
          <circle cx="12" cy="9" r="2.5" fill="white"/>
        </svg>
      </div>
      <div class="popover__title-block">
        <p class="popover__name">JogjaGuide AI</p>
        <p class="popover__status"><span class="dot-live"></span>Online</p>
      </div>
      <div class="popover__actions">
        <button class="popover__clear" id="clear-btn" title="Hapus chat">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="popover__close" id="chat-close" aria-label="Tutup">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div class="popover__messages" id="chat-box">
      <div class="popover__welcome">
        <p class="popover__welcome-emoji">🗺️</p>
        <p class="popover__welcome-text">
          <strong>Halo! Saya JogjaGuide.</strong><br>
          Tanya apa saja seputar wisata Yogyakarta — destinasi, kuliner, hotel, atau itinerary!
        </p>
      </div>

      <!-- Quick chips -->
      <div class="chips" id="chips">
        <button class="chip" data-prompt="Rekomendasikan kuliner khas Jogja yang wajib dicoba">🍜 Kuliner Jogja</button>
        <button class="chip" data-prompt="Itinerary 2 hari di Jogja untuk pasangan">📅 Itinerary</button>
        <button class="chip" data-prompt="Hotel murah tapi nyaman di Jogja">🏨 Hotel</button>
        <button class="chip" data-prompt="Apa oleh-oleh khas Jogja yang populer?">🎁 Oleh-oleh</button>
      </div>
    </div>

    <!-- Input -->
    <div class="popover__input-wrap">
      <form id="chat-form" autocomplete="off">
        <div class="popover__input-box">
          <input
            type="text"
            id="user-input"
            placeholder="Tanya tentang Jogja..."
            maxlength="1000"
          />
          <button type="submit" id="send-btn" aria-label="Kirim">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"
                    stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </form>
    </div>

  </div>

  <!-- Backdrop (click to close) -->
  <div class="chat-backdrop" id="chat-backdrop"></div>

  <!-- Floating trigger (bottom-right, visible when popover is closed) -->
  <button class="fab" id="fab" aria-label="Buka JogjaGuide AI">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="fab__badge"></span>
  </button>

  <script src="/js/script.js"></script>
</body>
</html>
